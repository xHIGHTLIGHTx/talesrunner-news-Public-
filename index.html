<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tales Runner — โพสต์ทัวร์นาเมนต์</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0e12;--surface:#16161c;--surface2:#1c1c24;
  --border:#2a2a36;--border-active:#4a4a60;
  --text:#e8e8f0;--text-sub:#7a7a92;--text-muted:#44445a;
  --accent:#7c6fff;--accent-dim:rgba(124,111,255,0.1);--accent-glow:rgba(124,111,255,0.22);
  --success:#4ade80;--warn:#f59e0b;--r:10px;--r-sm:6px;
}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:30px;height:30px;background:var(--accent-dim);border:1px solid rgba(124,111,255,0.35);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-name{font-size:13px;font-weight:600;color:var(--text);}
.logo-sub{font-size:9px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
.back-btn{font-size:12px;color:var(--text-sub);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .15s;}
.back-btn:hover{color:var(--text);}

/* Steps */
.steps-wrap{max-width:580px;margin:0 auto;padding:22px 24px 0;}
.steps{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.step{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:13px 16px;transition:background .2s;}
.step.active{background:var(--accent-dim);}
.step-num{width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step.active .step-num{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--accent-glow);}
.step.done .step-num{background:var(--success);color:#0e0e12;}
.step.inactive .step-num{background:var(--border);color:var(--text-muted);}
.step-label{font-size:12px;font-weight:500;}
.step.active .step-label{color:var(--text);}
.step.done .step-label{color:var(--text-sub);}
.step.inactive .step-label{color:var(--text-muted);}
.step-div{width:1px;height:20px;background:var(--border);flex-shrink:0;}

/* Layout */
.wrap{max-width:580px;margin:0 auto;padding:16px 24px 80px;}
.page{display:none;animation:fadeUp .25s ease both;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.page-header{margin-bottom:16px;}
.page-title{font-size:17px;font-weight:600;}
.page-sub{font-size:12px;color:var(--text-sub);margin-top:2px;}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;}
.card-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}
.field{margin-bottom:14px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
label{display:block;font-size:11px;color:var(--text-sub);margin-bottom:5px;}
.req-color{color:var(--accent);}
input[type="text"],input[type="url"],input[type="date"],select,textarea{
  width:100%;font-family:'Noto Sans Thai',sans-serif;font-size:13px;color:var(--text);
  background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 11px;
  outline:none;transition:border-color .15s,background .15s,box-shadow .15s;
}
input:focus,textarea:focus{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 0 3px var(--accent-dim);}
textarea{resize:vertical;min-height:88px;}
.hint{font-size:10px;color:var(--text-muted);margin-top:4px;}
.cc{font-size:10px;color:var(--text-muted);text-align:right;margin-top:4px;}
.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{font-size:12px;padding:6px 16px;border-radius:20px;border:1px solid var(--border);color:var(--text-sub);background:transparent;cursor:pointer;transition:all .15s;}
.pill.on{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

/* Upload Card */
.upload-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.upload-card.filled{border-color:var(--accent);}
.upload-row{display:flex;}
.drop-zone{width:120px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:100px;}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:5;}
.uploaded-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.upload-card.filled .uploaded-img{display:block;}
.upload-card.filled .drop-inner{display:none;}
.drop-inner{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
.drop-icon-wrap{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.drop-inner span{font-size:10px;color:var(--text-muted);}

.upload-info{flex:1;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.uinfo-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.uinfo-spec{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.uinfo-where{font-size:11px;color:var(--text-sub);margin-top:4px;}

.req-badge{font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(124,111,255,0.15);color:var(--accent);font-weight:600;}
.opt-badge{font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-muted);font-weight:500;}

.upload-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid rgba(124,111,255,0.15);background:rgba(124,111,255,0.04);}
.upload-footer.hidden{display:none;}
.dot-ok{width:6px;height:6px;border-radius:50%;background:var(--success);}
.change-btn{font-size:10px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(124,111,255,0.2);border-radius:4px;padding:3px 9px;cursor:pointer;}

.actions{display:flex;justify-content:space-between;gap:8px;margin-top:20px;}
.btn{font-size:13px;font-weight:500;padding:9px 18px;border-radius:var(--r-sm);cursor:pointer;border:none;display:inline-flex;align-items:center;gap:7px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-sub);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--success);color:var(--success);padding:11px 18px;border-radius:var(--r);font-size:13px;transition:transform .35s;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .drop-zone{width:90px;}
  .upload-info{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">TR</div>
    <div>
      <div class="logo-name">Tales Runner</div>
      <div class="logo-sub">News Hub</div>
    </div>
  </div>
  <a class="back-btn" href="#">กลับหน้าหลัก</a>
</header>

<div class="steps-wrap">
  <div class="steps">
    <div class="step active" id="s1">
      <div class="step-num">1</div>
      <div class="step-label">ข้อมูล</div>
    </div>
    <div class="step-div"></div>
    <div class="step inactive" id="s2">
      <div class="step-num">2</div>
      <div class="step-label">ไฟล์ภาพ</div>
    </div>
  </div>
</div>

<main class="wrap">
  <!-- PAGE 1 -->
  <div class="page active" id="p1">
    <div class="page-header">
      <div class="page-title">ข้อมูลทัวร์นาเมนต์</div>
      <div class="page-sub">กรอกข้อมูลพื้นฐานของการแข่งขัน</div>
    </div>
    <div class="card">
      <div class="field">
        <label>ชื่อการแข่งขัน <span class="req-color">*</span></label>
        <input type="text" placeholder="เช่น 1st Run Tournament">
      </div>
      <div class="field">
        <label>ประเภทการแข่งขัน</label>
        <div class="pills">
          <button class="pill on" onclick="togglePill(this)">เดี่ยว</button>
          <button class="pill" onclick="togglePill(this)">ทีม</button>
        </div>
      </div>
    </div>
    <div class="actions">
      <div></div>
      <button class="btn btn-primary" onclick="goTo(2)">ถัดไป</button>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="p2">
    <div class="page-header">
      <div class="page-title">อัปโหลดไฟล์ภาพ</div>
      <div class="page-sub">เลือกภาพที่ต้องการแสดงในระบบ</div>
    </div>

    <!-- Upload Slots -->
    <div id="upload-container"></div>

    <div class="actions">
      <button class="btn btn-ghost" onclick="goTo(1)">ย้อนกลับ</button>
      <button class="btn btn-primary" onclick="submitForm()">ส่งข้อมูล</button>
    </div>
  </div>
</main>

<div class="toast" id="toast">ส่งข่าวเรียบร้อยแล้ว รอแอดมินตรวจสอบ</div>

<script>
const slots = [
  {key:'logo', title:'โลโก้การแข่งขัน', spec:'1:1 · สูงสุด 2MB', badge:'req', where:'แสดงบนการ์ดรายการ'},
  {key:'banner', title:'Banner การแข่งขัน', spec:'16:9 · สูงสุด 5MB', badge:'req', where:'รูปหลักหน้าข้อมูล'},
  {key:'header', title:'Header การแข่งขัน', spec:'Full-width · 5MB', badge:'req', where:'แถบบนสุดของหน้า'},
  {key:'bracket', title:'สายการแข่งขัน', spec:'ไม่จำกัด · 5MB', badge:'opt', where:'ส่วน Bracket'}
];

function renderUploads() {
  const container = document.getElementById('upload-container');
  container.innerHTML = slots.map(s => `
    <div class="upload-card" id="uc-${s.key}">
      <div class="upload-row">
        <div class="drop-zone">
          <input type="file" accept="image/*" onchange="handleFile(this,'${s.key}')">
          <img class="uploaded-img" id="img-${s.key}">
          <div class="drop-inner">
            <div class="drop-icon-wrap">↑</div>
            <span>เลือกไฟล์</span>
          </div>
        </div>
        <div class="upload-info">
          <div>
            <div class="uinfo-title">${s.title} ${s.badge==='req' ? '<span class="req-badge">จำเป็น</span>' : '<span class="opt-badge">ไม่บังคับ</span>'}</div>
            <div class="uinfo-spec">${s.spec}</div>
            <div class="uinfo-where">${s.where}</div>
          </div>
        </div>
      </div>
      <div class="upload-footer hidden" id="foot-${s.key}">
        <div style="display:flex;align-items:center;gap:7px">
          <div class="dot-ok"></div>
          <span id="fn-${s.key}" style="font-size:11px"></span>
        </div>
        <button class="change-btn" onclick="triggerFile('${s.key}')">เปลี่ยนภาพ</button>
      </div>
    </div>
  `).join('');
}

function handleFile(input, key) {
  const file = input.files[0];
  if(!file) return;
  document.getElementById('uc-'+key).classList.add('filled');
  document.getElementById('img-'+key).src = URL.createObjectURL(file);
  document.getElementById('foot-'+key).classList.remove('hidden');
  document.getElementById('fn-'+key).textContent = file.name;
}

function triggerFile(key) {
  document.querySelector(`#uc-${key} input`).click();
}

function togglePill(el) {
  el.parentNode.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
}

function goTo(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  document.getElementById('s1').className = n === 2 ? 'step done' : 'step active';
  document.getElementById('s2').className = n === 2 ? 'step active' : 'step inactive';
}

function submitForm() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

renderUploads();
</script>
</body>
</html>
